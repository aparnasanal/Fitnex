<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Muscle Group</title>
</head>
<body>
  <div class="mdc-layout-grid">
            <form action="{% url 'update_muscle' mus_id=muscle.id %}" method="post" enctype="multipart/form-data">
              {% csrf_token %}
              <div class="mdc-layout-grid__inner">
              <div class="mdc-layout-grid__cell--span-8">
                <div class="mdc-card">
                  <h6 class="card-title">Edit Muscle Group</h6>
                  <div class="template-demo">
                    <div class="mdc-layout-grid__inner">
                    
                      <div class="mdc-layout-grid__cell stretch-card mdc-layout-grid__cell--span-10-desktop">
                        <div>
                          <div class="mt-5">
                            <p><b><i>Muscle Group Name</i></b></p>
                          </div>
                        <div class="mdc-text-field mdc-text-field--outlined">
                          <input class="mdc-text-field__input" id="text-field-hero-input" type="text" name="mname" value="{{muscle.M_Name}}">
                          <div class="mdc-notched-outline mdc-notched-outline--upgraded">
                            
                            <div class="mdc-notched-outline__leading"></div>
                            <div class="mdc-notched-outline__trailing"></div>
                          </div>
                        </div>
                        </div>
                        
                      </div>


                      
                       <div class="mdc-layout-grid__cell stretch-card mdc-layout-grid__cell--span-8-desktop">
                        <div>
                          <div class="mt-5">
                            <p><b><i>Upload Image</i></b></p>
                          </div>
                          <img src="{{muscle.M_Image.url}}" height="60px" width="80px" alt="">
                        <div class="mdc-text-field mdc-text-field--outlined">
                          <input class="mdc-text-field__input" type="file" id="text-field-hero-input" name="mimg">
                          <div class="mdc-notched-outline mdc-notched-outline--upgraded">
                            <div class="mdc-notched-outline__leading"></div>
                            
                            <div class="mdc-notched-outline__trailing"></div>
                          </div>
                        </div>
                        </div>
                          
                      </div> 
                        
                      </div>

                      <button class="mdc-button mdc-button--raised mdc-ripple-upgraded mt-5" type="submit">
                      Submit
                    </button>

                    </div>
                  </div>
                </div>
              </div>
            </form>
            
            </div>
          </div>
</body>
</html>
{% endblock %}
