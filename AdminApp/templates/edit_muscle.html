<!DOCTYPE html>
{% extends 'dashboard.html' %}
{% block content %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Muscle Group</title>
</head>
<body>
  <div class="mdc-layout-grid">

  <div style="max-width:700px; margin:40px auto; box-shadow: 2px 2px 10px 2px grey;">

    <div class="mdc-card" style="padding:40px; width:100%;">

      <h4 style="text-align:center; margin-bottom:30px;">Edit Muscle Group</h4>

      <form action="{% url 'update_muscle' mus_id=muscle.id %}" method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Muscle Group Name -->
        <div class="mt-4">
          <p><b><i>Muscle Group Name</i></b></p>

          <div class="mdc-text-field mdc-text-field--outlined" style="width:100%;">
            <input class="mdc-text-field__input" type="text" name="mname" value="{{muscle.M_Name}}">

            <div class="mdc-notched-outline">
              <div class="mdc-notched-outline__leading"></div>
              <div class="mdc-notched-outline__trailing"></div>
            </div>
          </div>
        </div>


        <!-- Current Image -->
        <div class="mt-4">
          <p><b><i>Current Image</i></b></p>

          <img src="{{muscle.M_Image.url}}" 
               style="width:120px; height:90px; object-fit:cover; border-radius:6px;">
        </div>


        <!-- Upload New Image -->
        <div class="mt-4">
          <p><b><i>Upload New Image</i></b></p>

          <div class="mdc-text-field mdc-text-field--outlined" style="width:100%;">
            <input class="mdc-text-field__input" type="file" name="mimg">

            <div class="mdc-notched-outline">
              <div class="mdc-notched-outline__leading"></div>
              <div class="mdc-notched-outline__trailing"></div>
            </div>
          </div>
        </div>


        <!-- Submit -->
        <div style="text-align:center; margin-top:30px;">
          <button class="mdc-button mdc-button--raised" type="submit">
            Update
          </button>
        </div>

      </form>

    </div>

  </div>

</div>

<div class="container mb-5" style="margin-top: 220px;"></div>

 <!-- Footer -->
        <footer>
          <div class="mdc-layout-grid">
            <div class="mdc-layout-grid__inner">
              <div class="mdc-layout-grid__cell stretch-card mdc-layout-grid__cell--span-6-desktop">
                <span class="text-center text-sm-left d-block d-sm-inline-block tx-14">
                  Copyright © 2026 Fitnex
                </span>
              </div>
              <div
                class="mdc-layout-grid__cell stretch-card mdc-layout-grid__cell--span-6-desktop d-flex justify-content-end">
                <span class="float-none float-sm-right d-block mt-1 mt-sm-0 text-center tx-14">
                  Custom Admin Dashboard
                </span>
              </div>
            </div>
          </div>
        </footer>
          
</body>
</html>
{% endblock %}
