<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up</title>
  <link rel="stylesheet" href="{% static 'login/css/style.css' %}">
</head>

<body>
  {% load socialaccount %}
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">

        <h2><b>SIGN UP</b></h2>
        <p>Access your account</p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <p style="color: red; margin-bottom: 15px; font-weight: 500;">
        {{ message }}
      </p>
      {% endfor %}
      {% endif %}

      <form method="post" class="login-form" id="loginForm" onsubmit="return password_validation()" novalidate action="{% url 'signup' %}">
        {% csrf_token %}
        <div class="form-group">
          <div class="input-wrapper">
            <input type="text" id="username" name="username" required autocomplete="username">
            <label for="username">Username</label>
            <span id="userError" style="color: red;"></span>
          </div>
          <span class="error-message" id="userError"></span>
        </div>

        <div class="form-group">
          <div class="input-wrapper">
            <input type="email" id="email" name="email" required autocomplete="email">
            <label for="email">Email</label>
            <span id="emailError" style="color: red;"></span>
          </div>
          <span class="error-message" id="emailError"></span>
        </div>

        <div class="form-group">
          <div class="input-wrapper password-wrapper">
            <input type="password" id="password1" name="password1" required autocomplete="current-password">
            <label for="password1">Password</label>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              <span class="toggle-icon"></span>
            </button>
            
          </div>
          <span id="pass1Error" style="color: red;"></span>
        </div><br>

        <div class="form-group">
          <div class="input-wrapper password-wrapper">
            <input type="password" id="password2" name="password2" required autocomplete="current-password">
            <label for="password2">Confirm Password</label>
            <button type="button" class="password-toggle" id="passwordToggle" aria-label="Toggle password visibility">
              <span class="toggle-icon"></span>
            </button>
            <span class="input-line"></span>
          </div>
          <span id="pass2Error" style="color: red;"></span>
        </div><br>

        <button type="submit" class="login-btn btn">
          <span class="btn-text">Create Account</span>
          <span class="btn-loader"></span>
          <span class="btn-glow"></span>
        </button>
      </form>

      <div class="divider">
        <span>or</span>
      </div>

      <div class="social-login">
        <a class="social-btn google-btn" href="{% provider_login_url 'google' %}?next={{ request.GET.next|default:'/' }}"
        style="text-decoration: none;">
          <span class="social-icon google-icon"></span>
          <span>Continue with Google</span>
        </a>
      </div>

      <div class="signup-link">
        <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
      </div>

      <div class="success-message" id="successMessage">
        <div class="success-icon">✓</div>
        <h3>Welcome back!</h3>
        <p>Redirecting to your dashboard...</p>
      </div>
    </div>

    <div class="background-effects">
      <div class="glow-orb glow-orb-1"></div>
      <div class="glow-orb glow-orb-2"></div>
      <div class="glow-orb glow-orb-3"></div>
    </div>
  </div>

  <!-- <script src="../../shared/js/form-utils.js"></script> -->
  <!-- <script src="{% static 'login/js/script.js' %}"></script> -->

  <script>
    function password_validation(){
      username = document.getElementById('username').value;
      email = document.getElementById('email').value;
      pass1 = document.getElementById('password1').value;
      pass2 = document.getElementById('password2').value;

      // strong password pattern

      pattern = /^(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*]).{6,}$/

      // clear errors
      document.getElementById('userError').innerHTML = ""
      document.getElementById('emailError').innerHTML = ""
      document.getElementById('pass1Error').innerHTML = ""
      document.getElementById('pass2Error').innerHTML = ""


      if(username == ""){
        document.getElementById('userError').innerHTML = "Please enter username"
      }

      if(email == ""){
        document.getElementById('emailError').innerHTML = "Please enter email address"
      }

      if(pass1 == ""){
        document.getElementById('pass1Error').innerHTML = "Please enter password"
      }

      if(pass2 == ""){
        document.getElementById('pass2Error').innerHTML = "Please enter confirm password"
      }

      if(!pattern.test(pass1)){
        document.getElementById('pass1Error').innerHTML = "Password must contain atleast 6 characters including 1 Upper Case, 1 Special Character and 1 Digit."
        return false;
      }

      else{
        return true;
      }
    }
  </script>
</body>

</html>
