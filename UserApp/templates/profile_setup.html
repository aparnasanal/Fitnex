<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup</title>
    <link rel="stylesheet" href="{% static 'login/css/style.css' %}">
</head>
<body>
    <div class="login-container" style="max-width: 1300px; margin: auto;">
        <div class="login-card" style="max-width: 1200px; width: 100%; margin: auto;">
            <div class="login-header">
                
                <h2 style="padding-top: 20px;"><b>PROFILE SETUP</b></h2>
                <p style="padding-bottom: 20px;"><b>Tell us about yourself to unlock your perfect plan.</b></p>
            </div>
            
            <form class="login-form" id="loginForm" method="POST" novalidate action="{% url 'profile_setup' %}">
    {% csrf_token %}

    <!-- ROW 1 -->
    <div class="form-row" style="margin-bottom: 50px; margin-top: 50px;">
        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" name="age" id="age" required>
                <label>Age</label>
                <span class="input-line"></span>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <select name="gender" id="gender" required>
                  <option value="" disabled selected hidden></option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                </select>
                <label for="">Gender</label>
                
                <span class="input-line"></span>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" name="height" id="height" required>
                <label>Height (cm)</label>
                <span class="input-line"></span>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" name="weight" id="weight" required>
                <label>Weight (kg)</label>
                <span class="input-line"></span>
            </div>
        </div>
    </div>

    <!-- ROW 2 -->
    <div class="form-row" style="margin-bottom: 50px;">
        <div class="form-group">
            <div class="input-wrapper">
                <input type="text" name="targetweight" id="targetweight" required>
                <label>Target Weight (kg)</label>
                <span class="input-line"></span>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <select name="goal" id="goal" required>
                  <option value="" disabled selected hidden></option>
                  <option value="Fat Loss">Fat Loss</option>
                  <option value="Muscle Gain">Muscle Gain</option>
                  <option value="Maintenance">Maintenance</option>
                </select>
                <label for="">Goal</label>
                <span class="input-line"></span>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <select name="activity" id="activity" required>
                  <option disabled selected hidden></option>
                  <option value="Sedentary">Sedentary</option>
                  <option value="Light">Light</option>
                  <option value="Moderate">Moderate</option>
                  <option value="Active">Active</option>
                </select>
                <label for="">Activity Level</label>
                <span class="input-line"></span>
            </div>
        </div>

        <div class="form-group">
            <div class="input-wrapper">
                <select name="experience" id="experience" required>
                  <option disabled selected hidden></option>
                  <option value="Beginner">Beginner</option>
                  <option value="Intermediate">Intermediate</option>
                  <option value="Advanced">Advanced</option>
                </select>
                <label for="">Experience Level</label>
                <span class="input-line"></span>
            </div>
        </div>
    </div>

    <button type="submit" class="login-btn btn" style="width: 50%; margin-left: 300px;">
        <span class="btn-text">Complete Setup</span>
    </button>
</form>

          
        </div>
        
        <div class="background-effects">
            <div class="glow-orb glow-orb-1"></div>
            <div class="glow-orb glow-orb-2"></div>
            <div class="glow-orb glow-orb-3"></div>
        </div>
    </div>

    <!-- <script src="../../shared/js/form-utils.js"></script> -->
    <script src="{% static 'login/js/script.js' %}"></script>
</body>
</html>
